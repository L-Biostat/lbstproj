url: https://l-biostat.github.io/lbstproj/

template:
  bootstrap: 5
  bslib:
    primary:         "#1B4E8C"   # navy  - hex border, Sigma, "L-Biostat"
    link-color:      "#1B4E8C"
    headings-color:  "#1B4E8C"
    code-color:      "#2CB5C0"   # teal  - ribbon accent
    code-bg:         "#eef8fa"
    pkgdown-nav-background: "#1B4E8C"
home:
  title: lbstproj
  description: >
    Tools to create and manage standardized statistical analysis projects
    for the L-Biostat group.

navbar:
  structure:
    left:  [intro, reference, articles]
    right: [github]
  components:
    intro:
      text: Get started
      href: articles/lbstproj.html

articles:
  - title: ~
    contents:
      - lbstproj

reference:
  - title: Project setup
    desc: Initialize a new project with a standard folder structure.
    contents:
      - create_project

  - title: Creating scripts
    desc: Generate R script from templates.
    contents:
      - create_file
      - create_from_tot

  - title: Saving outputs
    desc: Save figures, tables, and datasets to standardized locations.
    contents:
      - save_outputs

  - title: Table of Tables
    desc: Import and load the Table of Tables (TOT) metadata registry.
    contents:
      - import_tot
      - load_tot
      - get_info

  - title: Running scripts
    desc: Source all scripts of a given type in batch.
    contents:
      - run_all_files
      - run_all_figures
      - run_all_tables

  - title: Reporting
    desc: Generate, render, and archive Quarto reports.
    contents:
      - create_report
      - create_chunk
      - run_report
      - archive_report

  - title: Table engine
    desc: Query and check the table rendering engine configured for the project.
    contents:
      - get_table_engine
      - is_gt_project
      - is_flextable_project

  - title: Options
    desc: Package-level global options.
    contents:
      - lbstproj-options

